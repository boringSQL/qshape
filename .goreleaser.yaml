version: 2

project_name: qshape

before:
  hooks:
    - go mod tidy

# pg_query_go requires CGO, so cross-compilation needs a cross toolchain.
# In CI we build each OS on its own runner (see .github/workflows/release.yml).
builds:
  - id: qshape-darwin
    main: ./cmd/qshape
    binary: qshape
    env:
      - CGO_ENABLED=1
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
  - id: qshape-linux
    main: ./cmd/qshape
    binary: qshape
    env:
      - CGO_ENABLED=1
      - 'CC={{- if eq .Arch "arm64" -}}aarch64-linux-gnu-gcc{{- else -}}gcc{{- end -}}'
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: qshape
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: boringsql
    name: qshape
  draft: false
  prerelease: auto

# Homebrew publication is handled manually in the boringsql/homebrew-boringsql
# tap via `make update FORMULA=qshape TAG=vX.Y.Z` (source-formula convention,
# matching dryrun / fixturize / regresql). GoReleaser only builds release
# binaries here; the tap is not auto-pushed.
