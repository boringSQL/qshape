name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      # goreleaser-cross image ships the cross toolchains (osxcross for darwin,
      # aarch64-linux-gnu-gcc for linux/arm64) needed by CGO builds.
      - name: Run GoReleaser
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD":/go/src/qshape \
            -w /go/src/qshape \
            -e CGO_ENABLED=1 \
            -e GITHUB_TOKEN \
            ghcr.io/goreleaser/goreleaser-cross:latest \
            release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
